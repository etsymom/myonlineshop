<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="favicon.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Your Profile | InkwellMedia</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --aubergine: #2D1B4E;
      --amber: #F5A623;
      --amber-dark: #D4891A;
      --parchment: #FAF7F2;
      --white: #FFFFFF;
      --slate: #8A7FA0;
      --slate-light: #EDE9F5;
      --success: #059669;
      --radius: 16px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: var(--parchment); color: var(--aubergine); }

    /* HEADER */
    .header {
      background: var(--aubergine);
      padding: 14px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .brand { display: flex; align-items: center; gap: 10px; }
    .brand-icon { width: 36px; height: 36px; background: var(--amber); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
    .brand-name { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 900; color: var(--white); }
    .brand-name span { color: var(--amber); }

    .hbtn {
      padding: 9px 16px;
      border-radius: 10px;
      border: none;
      font-family: 'DM Sans', sans-serif;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
    }
    .hbtn-ghost { background: rgba(255,255,255,0.12); color: var(--white); }
    .hbtn-danger { background: #E3394A; color: var(--white); }

    /* MAIN */
    .container { max-width: 700px; margin: 36px auto; padding: 0 20px 60px; }

    .page-title { font-family: 'Playfair Display', serif; font-size: 32px; font-weight: 900; margin-bottom: 4px; }
    .page-sub { color: var(--slate); font-size: 15px; margin-bottom: 32px; }

    /* SECTION CARDS */
    .section-card {
      background: var(--white);
      border-radius: 20px;
      padding: 28px 28px;
      margin-bottom: 20px;
      box-shadow: 0 2px 12px rgba(45,27,78,0.07);
    }

    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      font-weight: 700;
      color: var(--aubergine);
      margin-bottom: 20px;
      padding-bottom: 14px;
      border-bottom: 2px solid var(--slate-light);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .section-icon {
      width: 36px; height: 36px;
      background: var(--slate-light);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    /* FORM GRID */
    .field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 520px) { .field-grid { grid-template-columns: 1fr; } }
    .field-full { grid-column: 1 / -1; }

    .field { display: flex; flex-direction: column; gap: 6px; }
    label {
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--slate);
    }
    input, select {
      padding: 12px 14px;
      border: 2px solid var(--slate-light);
      border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      color: var(--aubergine);
      background: var(--parchment);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      width: 100%;
    }
    input:focus, select:focus {
      border-color: var(--amber);
      box-shadow: 0 0 0 4px rgba(245,166,35,0.12);
      background: var(--white);
    }

    /* BUTTONS */
    .btn-save {
      width: 100%;
      padding: 15px;
      background: var(--amber);
      color: var(--aubergine);
      border: none;
      border-radius: 14px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 900;
      font-size: 16px;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s, transform 0.1s;
    }
    .btn-save:hover { background: var(--amber-dark); }
    .btn-save:active { transform: scale(0.99); }

    .btn-logout {
      width: 100%;
      padding: 14px;
      background: var(--white);
      color: var(--aubergine);
      border: 2px solid var(--slate-light);
      border-radius: 14px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      margin-top: 10px;
      transition: border-color 0.15s;
    }
    .btn-logout:hover { border-color: #E3394A; color: #E3394A; }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 14px;
      font-weight: 700;
      color: var(--slate);
      cursor: pointer;
      margin-bottom: 20px;
      text-decoration: none;
    }
    .back-link:hover { color: var(--aubergine); }
  </style>
</head>
<body>

  <div class="header">
    <div class="brand">
      <div class="brand-icon">🖋️</div>
      <div class="brand-name">Inkwell<span>Media</span></div>
    </div>
    <div style="display:flex;gap:8px;">
      <button class="hbtn hbtn-ghost" onclick="window.location.href='members.html'">← Dashboard</button>
      <button class="hbtn hbtn-danger" onclick="logout()">Log out</button>
    </div>
  </div>

  <div class="container">
    <div class="page-title">Your Profile</div>
    <p class="page-sub">Keep your details up to date so we can process payouts smoothly.</p>

    <!-- PERSONAL INFO -->
    <div class="section-card">
      <div class="section-title">
        <div class="section-icon">👤</div>
        Personal Information
      </div>
      <div class="field-grid">
        <div class="field field-full" style="display:flex;align-items:center;gap:16px;">
          <img id="avatar_preview" src="https://ui-avatars.com/api/?name=U&background=F3F0FA&color=6B46C1" style="width:60px;height:60px;border-radius:50%;object-fit:cover;border:2px solid var(--slate-light);">
          <div style="flex:1;">
            <label>Profile Picture</label>
            <input type="file" id="avatar_file" accept="image/*" style="padding:6px; background:white; cursor:pointer;" onchange="document.getElementById('avatar_preview').src = window.URL.createObjectURL(this.files[0])" />
          </div>
        </div>
        <div class="field">
          <label>First Name</label>
          <input id="first_name" placeholder="Jane" />
        </div>
        <div class="field">
          <label>Last Name</label>
          <input id="last_name" placeholder="Smith" />
        </div>
        <div class="field">
          <label>Date of Birth</label>
          <input id="dob" type="date" />
        </div>
        <div class="field">
          <label>Mobile Number</label>
          <input id="mobile" placeholder="+27 82 123 4567" />
        </div>
        <div class="field field-full">
          <label>Home Address</label>
          <input id="address" placeholder="123 Main Street, Cape Town" />
        </div>
      </div>
    </div>

    <!-- BANKING DETAILS -->
    <div class="section-card">
      <div class="section-title">
        <div class="section-icon">🏦</div>
        Banking Details
      </div>
      <div class="field-grid">
        <div class="field">
          <label>Bank Name</label>
          <input id="bank_name" placeholder="FNB, Nedbank, etc." />
        </div>
        <div class="field">
          <label>Account Holder</label>
          <input id="account_name" placeholder="Jane Smith" />
        </div>
        <div class="field">
          <label>Account Number</label>
          <input id="account_number" placeholder="123456789" />
        </div>
        <div class="field">
          <label>Account Type</label>
          <select id="account_type">
            <option value="Cheque">Cheque</option>
            <option value="Savings">Savings</option>
            <option value="Transmission">Transmission</option>
          </select>
        </div>
        <div class="field">
          <label>Branch Code</label>
          <input id="branch_code" placeholder="250655" />
        </div>
        <div class="field field-full">
          <label>Additional Notes</label>
          <input id="payout_notes" placeholder="Any notes for admin (optional)" />
        </div>
      </div>
    </div>

    <!-- MY ALBUMS -->
    <div class="section-card">
      <div class="section-title">
        <div class="section-icon">🎵</div>
        My Albums
      </div>
      <p style="font-size: 13px; color: var(--slate); margin-bottom: 16px;">Create a new album to sell on the marketplace.</p>
      <div class="field-grid" style="margin-bottom: 24px;">
        <div class="field field-full">
          <label>Album Title</label>
          <input id="album_title" placeholder="e.g., Summer Vibes 2026" />
        </div>
        <div class="field field-full">
          <label>Description</label>
          <input id="album_description" placeholder="A brief description of the album" />
        </div>
        <div class="field">
          <label>BASE PRICE (ZAR) <span style="font-size:11px; color:var(--slate); font-weight:normal;">(Auto-converts to USD/GBP/EUR)</span></label>
          <input type="number" id="album_price" placeholder="e.g., 10" min="0" step="0.01" />
        </div>
        <div class="field" style="display:none;">
          <label>Cover Image URL (or upload below)</label>
          <input id="album_cover" placeholder="https://example.com/cover.jpg" />
        </div>
        <div class="field field-full">
          <label>Upload Media Files (Videos/Images/Audio)</label>
          <input type="file" id="album_media_file" accept="image/*,video/*,audio/*" multiple style="padding:6px; background:white; cursor:pointer;" />
        </div>
        <div class="field field-full">
          <button id="btn-create-album" class="btn-save" onclick="createAlbum()" style="margin-top: 0; padding: 12px; font-size: 14px;">Create Album</button>
        </div>
      </div>
      
      <div class="section-title" style="border: none; margin-bottom: 10px; padding-bottom: 0;">
        Uploaded Albums
      </div>
      <div id="my-albums-list" style="display: flex; flex-direction: column; gap: 12px;">
        <p style="font-size: 13px; color: var(--slate);">Loading your albums...</p>
      </div>
    </div>

    <!-- ACTIONS -->
    <button class="btn-save" style="background:var(--slate-light); color:var(--aubergine); margin-bottom: 8px;" onclick="copyMyStorefrontLink()">📋 Copy My Storefront Link</button>
    <button class="btn-save" onclick="saveProfile()">Save Profile</button>
    <button class="btn-logout" onclick="logout()">Log Out</button>
  </div>

  <script src="locale.js?v=3"></script>
  <script src="geo-pricing.js?v=3"></script>
  <script src="cookie-consent.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const supabaseClient = supabase.createClient(
      "https://ndfqavpmqahdqpsqndbz.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5kZnFhdnBtcWFoZHFwc3FuZGJ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwODg0NjIsImV4cCI6MjA5NzY2NDQ2Mn0.DDiVkCTEJ__by6YlABHBhgKpyAWp_axezvDK7HwnVEs",
      { auth: { persistSession: true, autoRefreshToken: true } }
    );

    let sessionUser = null;

    async function loadProfile() {
      const { data: { session } } = await supabaseClient.auth.getSession();
      if (!session) { window.location.href = "index.html"; return; }
      sessionUser = session.user;
      await loadMyAlbums();
      const { data } = await supabaseClient.from("profiles").select("*").eq("id", sessionUser.id).maybeSingle();
      if (data) {
        if (data.avatar_url) document.getElementById("avatar_preview").src = data.avatar_url;
        ["first_name","last_name","dob","mobile","address","bank_name","account_name","account_number","account_type","branch_code","payout_notes"].forEach(f => {
          const el = document.getElementById(f);
          if (el) el.value = data[f] || "";
        });
      }
    }

    function copyMyStorefrontLink() {
      if (!sessionUser) return alert("Please log in to copy your link.");
      const url = window.location.origin + window.location.pathname.replace('profile.html', 'creator.html') + '?id=' + sessionUser.id;
      navigator.clipboard.writeText(url).then(() => {
        alert("Storefront link copied to clipboard! Share it with your fans.");
      }).catch(err => {
        console.error("Failed to copy link", err);
      });
    }

    async function saveProfile() {
      const btn = document.querySelector('button[onclick="saveProfile()"]');
      btn.textContent = "Saving...";
      btn.disabled = true;

      let avatar_url = document.getElementById("avatar_preview").src;
      const avatarFile = document.getElementById("avatar_file").files[0];
      
      if (avatarFile) {
        const fileExt = avatarFile.name.split('.').pop();
        const fileName = `${sessionUser.id}-${Date.now()}.${fileExt}`;
        const { error: uploadError } = await supabaseClient.storage.from('inkwell_media').upload(`avatars/${fileName}`, avatarFile);
        if (uploadError) { alert("Failed to upload avatar: " + uploadError.message); btn.textContent = "Save Profile"; btn.disabled = false; return; }
        const { data: { publicUrl } } = supabaseClient.storage.from('inkwell_media').getPublicUrl(`avatars/${fileName}`);
        avatar_url = publicUrl;
      }

      const payload = {
        id: sessionUser.id,
        avatar_url: avatar_url.includes('ui-avatars.com') ? null : avatar_url,
        first_name: document.getElementById("first_name").value,
        last_name: document.getElementById("last_name").value,
        dob: document.getElementById("dob").value,
        mobile: document.getElementById("mobile").value,
        address: document.getElementById("address").value,
        bank_name: document.getElementById("bank_name").value,
        account_name: document.getElementById("account_name").value,
        account_number: document.getElementById("account_number").value,
        account_type: document.getElementById("account_type").value,
        branch_code: document.getElementById("branch_code").value,
        payout_notes: document.getElementById("payout_notes").value
      };
      const { error } = await supabaseClient.from("profiles").upsert(payload);
      if (error) { alert("Save failed: " + error.message); btn.textContent = "Save Profile"; btn.disabled = false; return; }
      alert("Profile saved! ✅");
      window.location.href = "members.html";
    }

    async function logout() {
      await supabaseClient.auth.signOut();
      window.location.href = "index.html";
    }

    async function loadMyAlbums() {
      const { data, error } = await supabaseClient.from("albums").select("*").eq("user_id", sessionUser.id).order("created_at", { ascending: false });
      const list = document.getElementById("my-albums-list");
      if (error) { list.innerHTML = `<p style="color:var(--danger);font-size:13px;">Error: ${error.message}</p>`; return; }
      if (!data || data.length === 0) { list.innerHTML = `<p style="font-size:13px;color:var(--slate);">You haven't uploaded any albums yet.</p>`; return; }
      
      list.innerHTML = data.map(album => `
        <div style="display: flex; align-items: center; justify-content: space-between; padding: 12px; border: 1.5px solid var(--slate-light); border-radius: 12px; background: var(--parchment);">
          <div>
            <div style="font-size: 14px; font-weight: 700; color: var(--aubergine);">${album.title}</div>
            <div style="font-size: 12px; color: var(--slate);" data-zar="${album.price_zar}">R${Number(album.price_zar).toFixed(2)}</div>
          </div>
          <div style="display:flex; gap:8px;">
            <button class="btn-logout" style="width: auto; margin: 0; padding: 6px 12px; font-size: 12px; border-color: var(--slate-light); color: var(--slate);" onclick="editAlbum('${album.id}')">Edit</button>
            <button class="btn-logout" style="width: auto; margin: 0; padding: 6px 12px; font-size: 12px; border-color: var(--danger); color: var(--danger);" onclick="deleteAlbum('${album.id}')">Delete</button>
          </div>
        </div>
      `).join("");
      
      if (window.GeoPricing) {
        await GeoPricing.updatePagePrices();
      }
    }

    window.editingAlbumId = null;

    window.editAlbum = async (id) => {
      const { data, error } = await supabaseClient.from("albums").select("*").eq("id", id).single();
      if (error || !data) return alert("Failed to load album details.");
      
      const coverEl = document.getElementById("album_cover");
      document.getElementById("album_title").value = data.title || "";
      document.getElementById("album_description").value = data.description || "";
      document.getElementById("album_price").value = data.price_zar || 0;
      if (coverEl) coverEl.value = data.cover_image_url || "";
      
      window.editingAlbumId = id;
      const btn = document.getElementById("btn-create-album");
      btn.textContent = "Update Album";
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    async function createAlbum() {
      const btn = document.getElementById("btn-create-album");
      const originalText = btn.textContent;
      btn.textContent = "Saving...";
      btn.disabled = true;

      const title = document.getElementById("album_title").value.trim();
      const description = document.getElementById("album_description").value.trim();
      const price_zar = Number(document.getElementById("album_price").value) || 0;
      const coverEl = document.getElementById("album_cover");
      let cover_image_url = coverEl ? coverEl.value.trim() : "";
      const mediaFiles = document.getElementById("album_media_file").files;

      if (!title) { alert("Please enter an album title."); btn.textContent = originalText; btn.disabled = false; return; }

      const albumPayload = {
        title,
        description,
        price_zar,
        cover_image_url
      };

      let albumId = window.editingAlbumId;

      if (albumId) {
        // Update existing album
        const { error: updateError } = await supabaseClient.from("albums").update(albumPayload).eq("id", albumId);
        if (updateError) { alert("Failed to update album: " + updateError.message); btn.textContent = originalText; btn.disabled = false; return; }
      } else {
        // Create new album
        albumPayload.user_id = sessionUser.id;
        const { data: newAlbum, error: albumError } = await supabaseClient.from("albums").insert(albumPayload).select().single();
        if (albumError) { alert("Failed to create album: " + albumError.message); btn.textContent = originalText; btn.disabled = false; return; }
        albumId = newAlbum.id;
      }

      // 2. Upload media files and insert into album_media
      if (mediaFiles && mediaFiles.length > 0) {
        let is_free_count = 0;
        let finalCover = cover_image_url;
        let total_images = 0;
        let total_videos = 0;

        for (let i = 0; i < mediaFiles.length; i++) {
          const file = mediaFiles[i];
          const fileExt = file.name.split('.').pop();
          const fileName = `${sessionUser.id}-${Date.now()}-${i}.${fileExt}`;
          
          btn.textContent = `Uploading ${i+1}/${mediaFiles.length}...`;
          
          const { error: uploadError } = await supabaseClient.storage.from('inkwell_media').upload(`albums/${fileName}`, file);
          if (uploadError) { console.error("Failed to upload file", file.name, uploadError); continue; }
          
          const { data: { publicUrl } } = supabaseClient.storage.from('inkwell_media').getPublicUrl(`albums/${fileName}`);
          
          let mtype = 'audio';
          if (file.type.startsWith('video/')) { mtype = 'video'; total_videos++; }
          else if (file.type.startsWith('image/')) { mtype = 'image'; total_images++; }

          if (!finalCover && mtype === 'image') {
            finalCover = publicUrl;
          }

          const is_free = is_free_count < 3;
          is_free_count++;

          await supabaseClient.from("album_media").insert({
            album_id: albumId,
            media_url: publicUrl,
            media_type: mtype,
            is_free_preview: is_free
          });
        }
        
        // Update cover and counts
        await supabaseClient.from("albums").update({ 
          cover_image_url: finalCover,
          total_images: total_images,
          total_videos: total_videos
        }).eq("id", albumId);
      }

      alert(window.editingAlbumId ? "Album updated successfully! ✅" : "Album created successfully! ✅");
      document.getElementById("album_title").value = "";
      document.getElementById("album_description").value = "";
      document.getElementById("album_price").value = "";
      const coverEl2 = document.getElementById("album_cover");
      if (coverEl2) coverEl2.value = "";
      document.getElementById("album_media_file").value = "";
      
      window.editingAlbumId = null;
      btn.textContent = "Create Album";
      btn.disabled = false;
      loadMyAlbums();
    }

    window.deleteAlbum = async (id) => {
      if (!confirm("Are you sure you want to delete this album?")) return;
      const { error } = await supabaseClient.from("albums").delete().eq("id", id);
      if (error) { alert("Delete failed: " + error.message); return; }
      loadMyAlbums();
    };

    loadProfile();
  </script>
</body>
</html>
