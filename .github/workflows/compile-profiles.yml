name: Compile Creator Profiles

on:
  push:
    paths:
      - 'profiles/**'
      - 'scripts/compile_profiles.js'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Compile profiles
        run: node scripts/compile_profiles.js

      - name: Commit generated JSON if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/curated_profiles.json
          if git diff --staged --quiet; then
            echo "No changes to curated_profiles.json — skipping commit."
          else
            git commit -m "chore: update curated_profiles.json [skip ci]"
            git push
          fi
