<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Explore | InkwellMedia</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;700;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <style>
    :root {
      --aubergine: #2D1B4E;
      --amber: #F5A623;
      --parchment: #FAF7F2;
      --white: #FFFFFF;
      --slate: #8A7FA0;
    }

    body {
      background-color: black;
      font-family: 'DM Sans', sans-serif;
      margin: 0;
      padding: 0;
      overflow: hidden; /* Prevent body scroll, let container scroll */
      touch-action: pan-y;
      color: var(--white);
    }

    /* Video feed container */
    #feed-container {
      height: 100vh;
      height: 100dvh;
      width: 100%;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    #feed-container::-webkit-scrollbar {
      display: none;
    }

    /* Individual video block */
    .video-card {
      position: relative;
      width: 100%;
      height: 100vh;
      height: 100dvh;
      scroll-snap-align: start;
      scroll-snap-stop: always;
      background-color: black;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .video-player {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    /* UI Overlays */
    .overlay-right {
      position: absolute;
      bottom: 20px;
      right: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      z-index: 10;
    }

    .overlay-bottom {
      position: absolute;
      bottom: 20px;
      left: 16px;
      right: 70px;
      color: white;
      z-index: 10;
      text-shadow: 0px 1px 4px rgba(0,0,0,0.8);
    }

    /* Actions */
    .action-btn {
      background: transparent;
      border: none;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      filter: drop-shadow(0px 2px 4px rgba(0,0,0,0.5));
      transition: transform 0.2s;
    }
    .action-btn:active {
      transform: scale(0.9);
    }
    
    .action-icon {
      width: 36px;
      height: 36px;
    }
    .action-text {
      font-size: 13px;
      font-weight: 700;
    }

    /* Liked state animation */
    .action-btn.liked .heart-icon {
      fill: var(--amber);
      color: var(--amber);
      animation: pop 0.3s ease;
    }

    @keyframes pop {
      0% { transform: scale(1); }
      50% { transform: scale(1.3); }
      100% { transform: scale(1); }
    }

    /* Profile Avatar */
    .avatar-container {
      position: relative;
      margin-bottom: 8px;
    }
    .avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 2px solid white;
      object-fit: cover;
      background: var(--aubergine);
    }
    .add-btn {
      position: absolute;
      bottom: -8px;
      left: 50%;
      transform: translateX(-50%);
      width: 20px;
      height: 20px;
      background-color: var(--amber);
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      color: var(--aubergine);
      font-size: 16px;
      font-weight: 900;
      line-height: 1;
      border: 1px solid white;
    }

    /* Text info */
    .username {
      font-weight: 700;
      font-size: 16px;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .album-title {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .caption {
      font-size: 14px;
      line-height: 1.4;
      margin-bottom: 12px;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      color: rgba(255,255,255,0.9);
    }

    /* Play/Pause indicator overlay */
    .play-indicator {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 80px;
      height: 80px;
      background: rgba(0,0,0,0.5);
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      z-index: 5;
    }
    .play-indicator svg {
      width: 40px;
      height: 40px;
      fill: white;
      margin-left: 5px;
    }
    .video-card.paused .play-indicator {
      opacity: 1;
    }

    /* Header / Back button */
    .top-nav {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px;
      z-index: 20;
      background: linear-gradient(to bottom, rgba(0,0,0,0.6) 0%, transparent 100%);
    }
    .top-nav a {
      color: white;
      text-shadow: 0 1px 3px rgba(0,0,0,0.5);
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 6px;
      text-decoration: none;
    }

    .loading-state {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: var(--aubergine);
      z-index: 50;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid var(--slate);
      border-top-color: var(--amber);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

  </style>
</head>
<body>

  <!-- Loading State -->
  <div id="loading" class="loading-state">
    <div class="spinner"></div>
    <div style="font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 900;">InkwellMedia</div>
    <div style="color: var(--slate); font-size: 14px; margin-top: 4px;">Loading community videos...</div>
  </div>

  <!-- Top Navigation -->
  <div class="top-nav">
    <a href="members.html">
      <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"></path></svg>
      Dashboard
    </a>
    <div style="display:flex; gap:16px; align-items:center;">
       <div id="nav-videos" onclick="switchExploreTab('videos')" style="font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 900; cursor:pointer; transition: 0.2s;">Videos</div>
       <div id="nav-blogs" onclick="switchExploreTab('blogs')" style="font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; color:var(--slate); cursor:pointer; transition: 0.2s;">Blogs</div>
    </div>
    <div style="width: 24px;"></div> <!-- Spacer -->
  </div>

  <div id="feed-container">
    <!-- Videos will be injected here via JS -->
  </div>

  <script>
    const supabaseClient = supabase.createClient(
      "https://ndfqavpmqahdqpsqndbz.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5kZnFhdnBtcWFoZHFwc3FuZGJ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwODg0NjIsImV4cCI6MjA5NzY2NDQ2Mn0.DDiVkCTEJ__by6YlABHBhgKpyAWp_axezvDK7HwnVEs",
      { auth: { persistSession: true, autoRefreshToken: true } }
    );

    const formatNumber = (num) => {
      if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
      if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
      return num;
    };

    let videoFeedItems = [];
    let blogFeedItems = [];
    let currentTab = 'videos';

    async function loadFeed() {
      // 1. Fetch Supabase Profiles
      const { data: profilesData } = await supabaseClient.from("profiles").select("id, first_name, last_name, avatar_url");
      if (profilesData) {
        for (const p of profilesData) {
          profilesMap[p.id] = {
            name: (p.first_name || p.last_name) ? `${p.first_name || ''} ${p.last_name || ''}`.trim() : 'Creator',
            avatar: p.avatar_url || 'https://ui-avatars.com/api/?name=C&background=F3F0FA&color=6B46C1'
          };
        }
      }

      // Fetch curated github profiles
      try {
        const res = await fetch('curated_profiles.json');
        if (res.ok) {
           const curated = await res.json();
           for (const p of curated) {
             const avatar = (p.assets && p.assets.avatar) ? p.assets.avatar : 'https://ui-avatars.com/api/?name=C&background=F3F0FA&color=6B46C1';
             profilesMap[p.id] = { name: p.name, avatar: avatar };
             
             // Add curated albums to video feed
             if (p.albums) {
               for (const a of p.albums) {
                 const videos = (a.media || []).filter(m => m.type === 'video');
                 for (const vid of videos) {
                   videoFeedItems.push({
                     album: { title: a.title, description: a.description, user_id: p.id },
                     videoUrl: vid.url,
                     creator: profilesMap[p.id],
                     likes: Math.floor(Math.random() * 500) + 50,
                     comments: Math.floor(Math.random() * 50) + 5
                   });
                 }
               }
             }
             
             // Add curated blogs
             if (p.blogs) {
               for (const b of p.blogs) {
                 blogFeedItems.push({
                   creator: profilesMap[p.id],
                   user_id: p.id,
                   title: b.title,
                   content: b.content,
                   image: b.image,
                   date: b.date
                 });
               }
             }
           }
        }
      } catch (err) {
        console.log("No curated profiles or error fetching:", err);
      }

      // 2. Fetch Supabase Albums & Media
      const { data: albums, error } = await supabaseClient.from("albums")
        .select("*, album_media(*)")
        .order("created_at", { ascending: false });

      if (!error && albums) {
        for (const album of albums) {
          const mediaItems = album.album_media || [];
          const videos = mediaItems.filter(m => m.media_type === 'video');
          const freeVideos = videos.slice(0, 3);
          
          if (freeVideos.length > 0) {
            for (const vid of freeVideos) {
              videoFeedItems.push({
                album: album,
                videoUrl: vid.media_url,
                creator: profilesMap[album.user_id] || { name: 'Unknown', avatar: 'https://ui-avatars.com/api/?name=U' },
                likes: Math.floor(Math.random() * 500) + 50,
                comments: Math.floor(Math.random() * 50) + 5
              });
            }
          }
        }
      }

      // Fetch Supabase blogs if table exists
      try {
        const { data: blogs, error: blogErr } = await supabaseClient.from("blogs").select("*").order("created_at", { ascending: false });
        if (!blogErr && blogs) {
          for (const b of blogs) {
             blogFeedItems.push({
               creator: profilesMap[b.user_id] || { name: 'Unknown', avatar: 'https://ui-avatars.com/api/?name=U' },
               user_id: b.user_id,
               title: b.title,
               content: b.content,
               image: b.image_url,
               date: new Date(b.created_at).toLocaleDateString()
             });
          }
        }
      } catch (e) {
        console.log("Blogs table might not exist yet.");
      }
      
      // Shuffle video feed slightly for discovery
      videoFeedItems = videoFeedItems.sort(() => Math.random() - 0.5);

      if (videoFeedItems.length === 0 && blogFeedItems.length === 0) {
        document.getElementById('loading').innerHTML = `<p style="color:var(--slate)">No content found in the community yet.</p>`;
        return;
      }

      switchExploreTab('videos');
    }
    
    window.switchExploreTab = function(tab) {
       currentTab = tab;
       const vNav = document.getElementById("nav-videos");
       const bNav = document.getElementById("nav-blogs");
       
       if (tab === 'videos') {
         vNav.style.fontSize = '20px'; vNav.style.color = 'var(--white)';
         bNav.style.fontSize = '18px'; bNav.style.color = 'var(--slate)';
         renderFeed(videoFeedItems);
       } else {
         bNav.style.fontSize = '20px'; bNav.style.color = 'var(--white)';
         vNav.style.fontSize = '18px'; vNav.style.color = 'var(--slate)';
         renderBlogs(blogFeedItems);
       }
    }

    function renderBlogs(items) {
      const container = document.getElementById('feed-container');
      container.innerHTML = ''; 
      container.style.scrollSnapType = 'none'; // free scroll for blogs
      container.style.padding = '80px 20px 20px';

      if (items.length === 0) {
         container.innerHTML = '<p style="text-align:center; color:var(--slate); margin-top:40px;">No blogs found.</p>';
         document.getElementById('loading').style.display = 'none';
         return;
      }

      items.forEach(item => {
        const card = document.createElement('div');
        card.style.background = 'var(--aubergine)';
        card.style.borderRadius = '16px';
        card.style.padding = '20px';
        card.style.marginBottom = '20px';
        card.style.border = '1px solid var(--slate)';
        
        let imgHtml = item.image ? `<img src="${item.image}" style="width:100%; height:200px; object-fit:cover; border-radius:12px; margin-bottom:16px;">` : '';
        
        card.innerHTML = `
          ${imgHtml}
          <div style="display:flex; align-items:center; gap:10px; margin-bottom:12px;">
             <a href="creator.html?id=${item.user_id}"><img src="${item.creator.avatar}" style="width:36px; height:36px; border-radius:50%; object-fit:cover;"></a>
             <div>
                <div style="font-weight:700; font-size:14px;">${item.creator.name}</div>
                <div style="font-size:12px; color:var(--slate);">${item.date || ''}</div>
             </div>
          </div>
          <h2 style="font-family:'Playfair Display',serif; font-size:20px; margin-bottom:8px;">${item.title}</h2>
          <p style="font-size:14px; color:var(--parchment); line-height:1.5;">${item.content}</p>
        `;
        container.appendChild(card);
      });
      document.getElementById('loading').style.display = 'none';
    }

    function renderFeed(items) {
      const container = document.getElementById('feed-container');
      container.innerHTML = ''; // Clear
      container.style.scrollSnapType = 'y mandatory';
      container.style.padding = '0';
      
      if (items.length === 0) {
         container.innerHTML = '<p style="text-align:center; color:var(--slate); margin-top:80px;">No videos found.</p>';
         document.getElementById('loading').style.display = 'none';
         return;
      }

      items.forEach((item, index) => {
        const card = document.createElement('div');
        card.className = 'video-card';
        card.innerHTML = `
          <video class="video-player" loop playsinline preload="metadata">
            <source src="${item.videoUrl}" type="video/mp4">
          </video>
          
          <div class="play-indicator">
            <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
          </div>

          <div class="overlay-bottom">
            <div class="username">
              <span>${item.creator.name}</span>
            </div>
            <div class="album-title">${item.album.title}</div>
            <div class="caption">${item.album.description || 'Watch this amazing free video from our community!'}</div>
          </div>

          <div class="overlay-right">
            <a href="creator.html?id=${item.album.user_id}" class="avatar-container" style="display:block; text-decoration:none;">
              <img src="${item.creator.avatar}" alt="Profile" class="avatar">
              <div class="add-btn">+</div>
            </a>
          </div>
        `;
        container.appendChild(card);
      });

      document.getElementById('loading').style.display = 'none';
      setupInteractions();
    }

    function setupInteractions() {
      // Like Toggle Logic
      window.toggleLike = function(btn, baseCount) {
        btn.classList.toggle('liked');
        const isLiked = btn.classList.contains('liked');
        const countEl = btn.querySelector('.like-count');
        const newCount = isLiked ? baseCount + 1 : baseCount;
        countEl.innerText = formatNumber(newCount);
      };

      // Intersection Observer for Auto-Play/Pause
      const observerOptions = {
        root: document.getElementById('feed-container'),
        rootMargin: '0px',
        threshold: 0.6 // Video plays when 60% visible
      };

      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          const video = entry.target.querySelector('.video-player');
          if (entry.isIntersecting) {
            video.play().catch(e => {
              console.log("Autoplay blocked. User interaction required.");
              entry.target.classList.add('paused');
            });
            entry.target.classList.remove('paused');
          } else {
            video.pause();
          }
        });
      }, observerOptions);

      const cards = document.querySelectorAll('.video-card');
      cards.forEach(card => observer.observe(card));

      // Tap to Pause/Play
      cards.forEach(card => {
        const video = card.querySelector('.video-player');
        card.addEventListener('click', (e) => {
          if(e.target.closest('.overlay-right')) return; // Ignore clicks on right actions
          if (video.paused) {
            video.play();
            card.classList.remove('paused');
          } else {
            video.pause();
            card.classList.add('paused');
          }
        });
      });
    }

    // Start App
    init();
  </script>
</body>
</html>
