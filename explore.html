<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Explore | InkwellMedia</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;700;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <style>
    :root {
      --aubergine: #2D1B4E;
      --amber: #F5A623;
      --parchment: #FAF7F2;
      --white: #FFFFFF;
      --slate: #8A7FA0;
    }

    body {
      background-color: black;
      font-family: 'DM Sans', sans-serif;
      margin: 0;
      padding: 0;
      overflow: hidden; /* Prevent body scroll, let container scroll */
      touch-action: pan-y;
      color: var(--white);
    }

    /* Video feed container */
    #feed-container {
      height: 100vh;
      height: 100dvh;
      width: 100%;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    #feed-container::-webkit-scrollbar {
      display: none;
    }

    /* Individual video block */
    .video-card {
      position: relative;
      width: 100%;
      height: 100vh;
      height: 100dvh;
      scroll-snap-align: start;
      scroll-snap-stop: always;
      background-color: black;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .video-player {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* UI Overlays */
    .overlay-right {
      position: absolute;
      bottom: 20px;
      right: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      z-index: 10;
    }

    .overlay-bottom {
      position: absolute;
      bottom: 20px;
      left: 16px;
      right: 70px;
      color: white;
      z-index: 10;
      text-shadow: 0px 1px 4px rgba(0,0,0,0.8);
    }

    /* Actions */
    .action-btn {
      background: transparent;
      border: none;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      filter: drop-shadow(0px 2px 4px rgba(0,0,0,0.5));
      transition: transform 0.2s;
    }
    .action-btn:active {
      transform: scale(0.9);
    }
    
    .action-icon {
      width: 36px;
      height: 36px;
    }
    .action-text {
      font-size: 13px;
      font-weight: 700;
    }

    /* Liked state animation */
    .action-btn.liked .heart-icon {
      fill: var(--amber);
      color: var(--amber);
      animation: pop 0.3s ease;
    }

    @keyframes pop {
      0% { transform: scale(1); }
      50% { transform: scale(1.3); }
      100% { transform: scale(1); }
    }

    /* Profile Avatar */
    .avatar-container {
      position: relative;
      margin-bottom: 8px;
    }
    .avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 2px solid white;
      object-fit: cover;
      background: var(--aubergine);
    }
    .add-btn {
      position: absolute;
      bottom: -8px;
      left: 50%;
      transform: translateX(-50%);
      width: 20px;
      height: 20px;
      background-color: var(--amber);
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      color: var(--aubergine);
      font-size: 16px;
      font-weight: 900;
      line-height: 1;
      border: 1px solid white;
    }

    /* Text info */
    .username {
      font-weight: 700;
      font-size: 16px;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .album-title {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .caption {
      font-size: 14px;
      line-height: 1.4;
      margin-bottom: 12px;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      color: rgba(255,255,255,0.9);
    }

    /* Play/Pause indicator overlay */
    .play-indicator {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 80px;
      height: 80px;
      background: rgba(0,0,0,0.5);
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      z-index: 5;
    }
    .play-indicator svg {
      width: 40px;
      height: 40px;
      fill: white;
      margin-left: 5px;
    }
    .video-card.paused .play-indicator {
      opacity: 1;
    }

    /* Header / Back button */
    .top-nav {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px;
      z-index: 20;
      background: linear-gradient(to bottom, rgba(0,0,0,0.6) 0%, transparent 100%);
    }
    .top-nav a {
      color: white;
      text-shadow: 0 1px 3px rgba(0,0,0,0.5);
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 6px;
      text-decoration: none;
    }

    .loading-state {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: var(--aubergine);
      z-index: 50;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid var(--slate);
      border-top-color: var(--amber);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

  </style>
</head>
<body>

  <!-- Loading State -->
  <div id="loading" class="loading-state">
    <div class="spinner"></div>
    <div style="font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 900;">InkwellMedia</div>
    <div style="color: var(--slate); font-size: 14px; margin-top: 4px;">Loading community videos...</div>
  </div>

  <!-- Top Navigation -->
  <div class="top-nav">
    <a href="members.html">
      <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"></path></svg>
      Dashboard
    </a>
    <div style="font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 900;">Explore</div>
    <div style="width: 24px;"></div> <!-- Spacer -->
  </div>

  <div id="feed-container">
    <!-- Videos will be injected here via JS -->
  </div>

  <script>
    const supabaseClient = supabase.createClient(
      "https://ndfqavpmqahdqpsqndbz.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5kZnFhdnBtcWFoZHFwc3FuZGJ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwODg0NjIsImV4cCI6MjA5NzY2NDQ2Mn0.DDiVkCTEJ__by6YlABHBhgKpyAWp_axezvDK7HwnVEs",
      { auth: { persistSession: true, autoRefreshToken: true } }
    );

    const formatNumber = (num) => {
      if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
      if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
      return num;
    };

    let currentUser = null;
    let profilesMap = {};

    async function init() {
      const { data: { session } } = await supabaseClient.auth.getSession();
      if (!session) {
        window.location.href = "index.html";
        return;
      }
      currentUser = session.user;

      await loadFeed();
    }

    async function loadFeed() {
      // 1. Fetch Profiles
      const { data: profilesData } = await supabaseClient.from("profiles").select("id, first_name, last_name, avatar_url");
      if (profilesData) {
        for (const p of profilesData) {
          profilesMap[p.id] = {
            name: (p.first_name || p.last_name) ? `${p.first_name || ''} ${p.last_name || ''}`.trim() : 'Creator',
            avatar: p.avatar_url || 'https://ui-avatars.com/api/?name=C&background=F3F0FA&color=6B46C1'
          };
        }
      }

      // 2. Fetch Albums & Media
      const { data: albums, error } = await supabaseClient.from("albums")
        .select("*, album_media(*)")
        .order("created_at", { ascending: false });

      if (error) {
        console.error("Error fetching albums:", error);
        document.getElementById('loading').innerHTML = `<p style="color:var(--danger)">Failed to load feed.</p>`;
        return;
      }

      // 3. Filter for Free Albums that have Videos
      const feedItems = [];
      
      for (const album of albums) {
        if (Number(album.price_zar) !== 0) continue; // Only free content
        
        const mediaItems = album.album_media || [];
        const videos = mediaItems.filter(m => m.media_type === 'video');
        
        if (videos.length > 0) {
          // Add each video as a feed item
          for (const vid of videos) {
            feedItems.push({
              album: album,
              videoUrl: vid.media_url,
              creator: profilesMap[album.user_id] || { name: 'Unknown', avatar: 'https://ui-avatars.com/api/?name=U' },
              likes: Math.floor(Math.random() * 500) + 50, // Mock stats for UI
              comments: Math.floor(Math.random() * 50) + 5,
              bookmarks: Math.floor(Math.random() * 100) + 10,
              shares: Math.floor(Math.random() * 20) + 2
            });
          }
        }
      }

      if (feedItems.length === 0) {
        document.getElementById('loading').innerHTML = `<p style="color:var(--slate)">No free videos found in the community yet.</p>`;
        return;
      }

      renderFeed(feedItems);
    }

    function renderFeed(items) {
      const container = document.getElementById('feed-container');
      container.innerHTML = ''; // Clear

      items.forEach((item, index) => {
        const card = document.createElement('div');
        card.className = 'video-card';
        card.innerHTML = \`
          <video class="video-player" loop playsinline preload="metadata">
            <source src="\${item.videoUrl}" type="video/mp4">
          </video>
          
          <div class="play-indicator">
            <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
          </div>

          <div class="overlay-bottom">
            <div class="username">
              <span>\${item.creator.name}</span>
            </div>
            <div class="album-title">\${item.album.title}</div>
            <div class="caption">\${item.album.description || 'Watch this amazing free video from our community!'}</div>
          </div>

          <div class="overlay-right">
            <div class="avatar-container">
              <img src="\${item.creator.avatar}" alt="Profile" class="avatar">
              <div class="add-btn">+</div>
            </div>
            
            <button class="action-btn like-btn" onclick="toggleLike(this, \${item.likes})">
              <svg class="action-icon heart-icon" fill="currentColor" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
              <span class="action-text like-count">\${formatNumber(item.likes)}</span>
            </button>
            
            <button class="action-btn">
              <svg class="action-icon" fill="currentColor" viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
              <span class="action-text">\${formatNumber(item.comments)}</span>
            </button>
            
            <button class="action-btn">
              <svg class="action-icon" fill="currentColor" viewBox="0 0 24 24"><path d="M17 3H7c-1.1 0-1.99.9-1.99 2L5 21l7-3 7 3V5c0-1.1-.9-2-2-2z"/></svg>
              <span class="action-text">\${formatNumber(item.bookmarks)}</span>
            </button>
            
            <button class="action-btn">
              <svg class="action-icon" fill="currentColor" viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92c0-1.61-1.31-2.92-2.92-2.92z"/></svg>
              <span class="action-text">\${formatNumber(item.shares)}</span>
            </button>
          </div>
        \`;
        container.appendChild(card);
      });

      // Hide loading screen
      document.getElementById('loading').style.display = 'none';

      setupInteractions();
    }

    function setupInteractions() {
      // Like Toggle Logic
      window.toggleLike = function(btn, baseCount) {
        btn.classList.toggle('liked');
        const isLiked = btn.classList.contains('liked');
        const countEl = btn.querySelector('.like-count');
        const newCount = isLiked ? baseCount + 1 : baseCount;
        countEl.innerText = formatNumber(newCount);
      };

      // Intersection Observer for Auto-Play/Pause
      const observerOptions = {
        root: document.getElementById('feed-container'),
        rootMargin: '0px',
        threshold: 0.6 // Video plays when 60% visible
      };

      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          const video = entry.target.querySelector('.video-player');
          if (entry.isIntersecting) {
            video.play().catch(e => {
              console.log("Autoplay blocked. User interaction required.");
              entry.target.classList.add('paused');
            });
            entry.target.classList.remove('paused');
          } else {
            video.pause();
          }
        });
      }, observerOptions);

      const cards = document.querySelectorAll('.video-card');
      cards.forEach(card => observer.observe(card));

      // Tap to Pause/Play
      cards.forEach(card => {
        const video = card.querySelector('.video-player');
        card.addEventListener('click', (e) => {
          if(e.target.closest('.overlay-right')) return; // Ignore clicks on right actions
          if (video.paused) {
            video.play();
            card.classList.remove('paused');
          } else {
            video.pause();
            card.classList.add('paused');
          }
        });
      });
    }

    // Start App
    init();
  </script>
</body>
</html>
