<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set New Password | InkwellMedia</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    body { background: var(--ink-parchment); color: var(--ink-aubergine); display: flex; flex-direction: column; min-height: 100vh; }
    .auth-container { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
    .auth-card { background: var(--ink-white); border-radius: 24px; padding: 40px; width: 100%; max-width: 420px; box-shadow: 0 8px 32px rgba(45,27,78,0.08); text-align: center; }
    .auth-card h1 { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 900; margin-bottom: 12px; }
    .auth-card p { font-size: 14px; color: var(--ink-slate); margin-bottom: 24px; line-height: 1.6; }
    .form-group { text-align: left; margin-bottom: 20px; }
    .form-label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; color: var(--ink-aubergine); }
    .form-input { width: 100%; padding: 12px 14px; border: 2px solid var(--ink-slate-light); border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--ink-aubergine); outline: none; transition: border-color 0.2s; }
    .form-input:focus { border-color: var(--ink-amber); }
    .auth-btn { width: 100%; padding: 14px; background: var(--ink-amber); color: var(--ink-aubergine); border: none; border-radius: 10px; font-family: 'DM Sans', sans-serif; font-weight: 900; font-size: 15px; cursor: pointer; transition: opacity 0.15s; margin-bottom: 16px; }
    .auth-btn:hover { opacity: 0.85; }
    .auth-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .auth-msg { margin-bottom: 16px; padding: 12px; border-radius: 8px; font-size: 13px; display: none; }
    .msg-error { background: #FEF0F2; color: #9B1825; border: 1px solid var(--ink-danger); }
    .msg-success { background: #EBF9F4; color: #1A7A56; border: 1px solid #2EAD7B; }
  </style>
</head>
<body>
  <div id="inkwell-header-mount"></div>

  <div class="auth-container">
    <div class="auth-card">
      <h1>Set New Password</h1>
      <p>Enter your new password below.</p>
      
      <div id="msg" class="auth-msg"></div>

      <form id="update-form" onsubmit="handleUpdate(event)">
        <div class="form-group">
          <label class="form-label" for="password">New Password</label>
          <input type="password" id="password" class="form-input" required minlength="6">
        </div>
        <button type="submit" id="submit-btn" class="auth-btn">Update Password</button>
      </form>
    </div>
  </div>

  <div id="inkwell-footer-mount"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="inkwell-config.js"></script>
  <script src="inkwell-layout.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      const sb = supabase.createClient(window.INK_CONFIG.SUPABASE_URL, window.INK_CONFIG.SUPABASE_ANON);
      
      // Check if we arrived here with an active session (from the recovery link)
      const { data: { session } } = await sb.auth.getSession();
      if (!session && !window.location.hash.includes('access_token')) {
        document.getElementById('msg').textContent = 'Invalid or expired reset link. Please request a new one.';
        document.getElementById('msg').className = 'auth-msg msg-error';
        document.getElementById('msg').style.display = 'block';
        document.getElementById('update-form').style.display = 'none';
      }
    });

    async function handleUpdate(e) {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      const password = document.getElementById('password').value;
      const msgBox = document.getElementById('msg');
      
      btn.disabled = true;
      btn.textContent = 'Updating...';
      msgBox.style.display = 'none';

      const sb = supabase.createClient(window.INK_CONFIG.SUPABASE_URL, window.INK_CONFIG.SUPABASE_ANON);
      
      const { error } = await sb.auth.updateUser({ password: password });

      if (error) {
        msgBox.textContent = error.message;
        msgBox.className = 'auth-msg msg-error';
        msgBox.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Update Password';
      } else {
        msgBox.textContent = 'Password updated successfully! Redirecting...';
        msgBox.className = 'auth-msg msg-success';
        msgBox.style.display = 'block';
        setTimeout(() => {
          window.location.href = 'members.html';
        }, 2000);
      }
    }
  </script>
</body>
</html>
