<!doctype html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="favicon.png">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InkwellMedia — Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --aubergine: #2D1B4E;
      --amber: #F5A623;
      --amber-dark: #D4891A;
      --parchment: #FAF7F2;
      --white: #FFFFFF;
      --slate: #8A7FA0;
      --slate-light: #EDE9F5;
      --error: #E3394A;
      --success: #2EAD7B;
      --warn-bg: #FFF8EC;
      --radius: 18px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--aubergine);
      display: grid;
      place-items: center;
      min-height: 100%;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    /* Background blobs */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.18;
      pointer-events: none;
    }
    .blob-1 {
      width: 500px; height: 500px;
      background: var(--amber);
      top: -100px; right: -100px;
      animation: drift 8s ease-in-out infinite alternate;
    }
    .blob-2 {
      width: 400px; height: 400px;
      background: #7B4FBF;
      bottom: -80px; left: -80px;
      animation: drift 10s ease-in-out infinite alternate-reverse;
    }
    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(30px, 20px) scale(1.08); }
    }

    .card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 36px 32px 28px;
      width: min(420px, 100%);
      box-shadow: 0 32px 80px rgba(0,0,0,0.35);
      position: relative;
      z-index: 1;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
    }
    .brand-icon {
      width: 40px; height: 40px;
      background: var(--aubergine);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }
    .brand-name {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      font-weight: 900;
      color: var(--aubergine);
    }
    .brand-dot {
      color: var(--amber);
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      font-weight: 900;
      color: var(--aubergine);
      line-height: 1.2;
      margin-bottom: 6px;
    }
    .subtitle {
      color: var(--slate);
      font-size: 14px;
      margin-bottom: 20px;
    }

    /* Tabs */
    .tabs {
      display: flex;
      background: var(--slate-light);
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 22px;
      gap: 4px;
    }
    .tab {
      flex: 1;
      padding: 10px;
      border-radius: 9px;
      border: none;
      background: transparent;
      font-family: 'DM Sans', sans-serif;
      font-weight: 700;
      font-size: 14px;
      color: var(--slate);
      cursor: pointer;
      transition: all 0.2s;
    }
    .tab.active {
      background: var(--aubergine);
      color: var(--white);
      box-shadow: 0 2px 8px rgba(45,27,78,0.25);
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: var(--aubergine);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
      margin-top: 16px;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 13px 14px;
      border: 2px solid var(--slate-light);
      border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      color: var(--aubergine);
      background: var(--parchment);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus {
      border-color: var(--amber);
      box-shadow: 0 0 0 4px rgba(245,166,35,0.15);
      background: var(--white);
    }

    .btn-primary {
      width: 100%;
      margin-top: 20px;
      padding: 14px;
      background: var(--amber);
      color: var(--aubergine);
      border: none;
      border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 900;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      letter-spacing: 0.01em;
    }
    .btn-primary:hover { background: var(--amber-dark); }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

    .helper {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 14px;
      font-size: 13px;
      color: var(--slate);
    }
    .link {
      color: var(--aubergine);
      font-weight: 700;
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .msg {
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 500;
      display: none;
      line-height: 1.4;
    }
    .msg.ok { background: #EBF9F4; color: #1A7A56; border: 1.5px solid #2EAD7B; display: block; }
    .msg.err { background: #FEF0F2; color: #9B1825; border: 1.5px solid #E3394A; display: block; }
    .msg.warn { background: var(--warn-bg); color: #92600A; border: 1.5px solid #F5A623; display: block; }

    .footer-note {
      margin-top: 18px;
      font-size: 12px;
      color: var(--slate);
      text-align: center;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="card">
    <div class="brand">
      <div class="brand-icon">🖋️</div>
      <div class="brand-name">Inkwell<span class="brand-dot">Media</span></div>
    </div>

    <h1>Welcome back.</h1>
    <p class="subtitle">Sign in to your community account.</p>

    <div class="tabs" role="tablist">
      <button class="tab active" id="loginTab" type="button">Log in</button>
      <button class="tab" id="signupTab" type="button">Sign up</button>
    </div>

    <form id="auth-form">
      <label for="email">Email</label>
      <input id="email" type="email" placeholder="you@example.com" autocomplete="email" required />

      <label for="password">Password</label>
      <input id="password" type="password" placeholder="••••••••" autocomplete="current-password" required />

      <button class="btn-primary" id="primaryBtn" type="submit">Log in</button>
    </form>

    <div class="helper">
      <span>Forgot your password?</span>
      <span class="link" id="resetLink">Send reset link</span>
    </div>

    <div class="msg" id="msg"></div>

    <p class="footer-note">Already a member? You'll be forwarded to your dashboard automatically.</p>
  </div>

  <script src="locale.js"></script>
  <script src="geo-pricing.js"></script>
  <script src="cookie-consent.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const supabaseClient = supabase.createClient(
      "https://ndfqavpmqahdqpsqndbz.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5kZnFhdnBtcWFoZHFwc3FuZGJ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwODg0NjIsImV4cCI6MjA5NzY2NDQ2Mn0.DDiVkCTEJ__by6YlABHBhgKpyAWp_axezvDK7HwnVEs",
      { auth: { persistSession: true, autoRefreshToken: true } }
    );

    let mode = "login";
    const loginTab = document.getElementById("loginTab");
    const signupTab = document.getElementById("signupTab");
    const form = document.getElementById("auth-form");
    const primaryBtn = document.getElementById("primaryBtn");
    const msg = document.getElementById("msg");

    function setMessage(type, text) {
      msg.className = "msg " + (type || "");
      msg.textContent = text || "";
      if (!text) msg.style.display = "none";
    }

    function setLoading(v) {
      primaryBtn.disabled = v;
      primaryBtn.textContent = v ? "Please wait…" : (mode === "login" ? "Log in" : "Create account");
    }

    function setMode(next) {
      mode = next;
      loginTab.classList.toggle("active", mode === "login");
      signupTab.classList.toggle("active", mode === "signup");
      primaryBtn.textContent = mode === "login" ? "Log in" : "Create account";
      document.getElementById("password").autocomplete = mode === "login" ? "current-password" : "new-password";
      setMessage("", "");
    }

    loginTab.addEventListener("click", () => setMode("login"));
    signupTab.addEventListener("click", () => setMode("signup"));

    (async () => {
      const { data: { session } } = await supabaseClient.auth.getSession();
      if (session) window.location.href = "members.html";
    })();

    supabaseClient.auth.onAuthStateChange((_e, session) => {
      if (session) window.location.href = "members.html";
    });

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      setMessage("", "");
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();
      if (!email || !password) { setMessage("warn", "Please enter your email and password."); return; }
      setLoading(true);
      try {
        if (mode === "login") {
          const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
          if (error) throw error;
        } else {
          const { data, error } = await supabaseClient.auth.signUp({ email, password });
          if (error) throw error;
          if (!data?.session) {
            setMessage("ok", "Account created! Check your email to confirm, then log in.");
            setMode("login");
          }
        }
      } catch (err) {
        setMessage("err", err?.message || "Something went wrong.");
      } finally {
        setLoading(false);
      }
    });

    document.getElementById("resetLink").addEventListener("click", async () => {
      setMessage("", "");
      const email = document.getElementById("email").value.trim();
      if (!email) { setMessage("warn", "Enter your email first, then click reset."); return; }
      setLoading(true);
      try {
        const { error } = await supabaseClient.auth.resetPasswordForEmail(email);
        if (error) throw error;
        setMessage("ok", "If that email exists, a reset link is on its way.");
      } catch (err) {
        setMessage("err", err?.message || "Could not send reset email.");
      } finally {
        setLoading(false);
      }
    });

    setMode("login");
  </script>
</body>
</html>
